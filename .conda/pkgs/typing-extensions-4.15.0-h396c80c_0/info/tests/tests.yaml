- python:
    imports:
    - typing_extensions
    python_version:
    - 3.10.*
    - 3.13.*
- script:
    content: |-
      cd src
      coverage run --source=typing_extensions --branch -m unittest -vv
      coverage report --show-missing --skip-covered --fail-under=68
    cwd: etc/conda/test-files/typing-extensions/1
  requirements:
    run:
    - python 3.10.*
    - coverage
  files:
    source:
    - src/
    - '!src/typing_extensions.py'
