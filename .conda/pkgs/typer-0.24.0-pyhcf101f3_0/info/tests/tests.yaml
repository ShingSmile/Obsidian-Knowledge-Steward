- python:
    imports:
    - typer
    python_version: 3.10.*
- script:
    content: |-
      typer --version
      typer --help
      cd typer
      coverage run --source=typer --branch -m pytest -vv --color=yes --tb=long -k "not ((multiple_values and main) or completion or invalid_score)"
      coverage report --show-missing --skip-covered --fail-under=66
    cwd: etc/conda/test-files/typer/1
  requirements:
    run:
    - coverage
    - pytest
    - python 3.10.*
  files:
    source:
    - typer/tests/
    - typer/docs_src/
