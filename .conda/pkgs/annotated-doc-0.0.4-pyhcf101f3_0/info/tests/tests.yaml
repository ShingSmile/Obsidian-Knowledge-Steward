- python:
    imports:
    - annotated_doc
    python_version:
    - 3.10.*
    - 3.14.*
- script:
    content: |-
      coverage run --source=annotated_doc --branch -m pytest -vv --tb=long --color=yes
      coverage report --show-missing --skip-covered --fail-under=100
    cwd: etc/conda/test-files/annotated-doc/1
  requirements:
    run:
    - pytest-cov
    - python 3.10.*
  files:
    source:
    - tests/
